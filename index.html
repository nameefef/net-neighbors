<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网上邻居</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text-muted:#8b949e;--accent:#f0883e;--accent-dim:rgba(240,136,62,.15);--green:#3fb950;--blue:#58a6ff;--gray:#484f58;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC","PingFang SC",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.container{max-width:960px;margin:0 auto;padding:32px 20px;width:100%;flex:1}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:28px}
.header h1{font-size:22px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.header h1 span{color:var(--accent)}
.badge{font-size:12px;background:var(--accent-dim);color:var(--accent);padding:4px 10px;border-radius:999px;border:1px solid rgba(240,136,62,.2);font-weight:500}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px;display:flex;align-items:center;gap:6px}

/* IP grid */
.ip-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.ip-grid{grid-template-columns:1fr}}
.ip-item{background:rgba(255,255,255,.03);border-radius:6px;padding:12px 16px;border:1px solid transparent}
.ip-item.active{border-color:rgba(240,136,62,.25);background:var(--accent-dim)}
.ip-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:500}
.ip-value{font-family:"SF Mono","Fira Code","Cascadia Code",monospace;font-size:16px;font-weight:600}
.ip-value.loading{color:var(--text-muted);font-size:13px}
.ip-value .sub{font-size:13px;font-weight:400;color:var(--text-muted);margin-left:6px}

/* Neighbor list */
.nlist{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.nrow{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:14px;transition:background .15s}
.nrow:hover{background:rgba(255,255,255,.03)}
.nrow.you{background:var(--accent-dim)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.online{background:var(--green);box-shadow:0 0 6px rgba(63,185,80,.35)}
.dot.you{background:var(--accent);box-shadow:0 0 6px rgba(240,136,62,.35)}
.addr{color:var(--text);font-family:"SF Mono",monospace;font-size:13px}
.addr.you{color:var(--accent)}
.rtag{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:600;margin-left:auto;line-height:1.5}
.rtag.online{background:rgba(63,185,80,.12);color:var(--green)}
.rtag.you{background:var(--accent-dim);color:var(--accent)}
.rname{font-size:13px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}

/* Messages */
.msg{padding:12px 0;display:flex;gap:10px}
.msg+.msg{border-top:1px solid var(--border)}
.msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.msg-body{flex:1;min-width:0}
.msg-hd{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1px}
.msg-n{font-size:13px;font-weight:600;color:var(--text)}
.msg-ip{font-size:11px;color:var(--text-muted);font-family:"SF Mono",monospace}
.msg-t{font-size:14px;color:var(--text-muted);line-height:1.6;word-break:break-word}
.msg-tm{font-size:11px;color:var(--gray);flex-shrink:0;align-self:flex-start}
.empty{text-align:center;padding:32px 0;color:var(--text-muted);font-size:14px;line-height:1.7}

/* Input */
.input-row{display:flex;gap:8px;padding-top:14px;margin-top:4px;border-top:1px solid var(--border)}
.input-row input{flex:1;background:#0d1117;border:1px solid var(--border);border-radius:999px;padding:10px 16px;font-size:14px;color:var(--text);outline:none;transition:border .2s}
.input-row input:focus{border-color:var(--accent)}
.input-row input::placeholder{color:var(--gray)}
.btn{padding:9px 20px;border:none;border-radius:999px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Name setup */
.name-row{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.name-row input{background:#0d1117;border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:13px;color:var(--text);outline:none;transition:border .2s;width:160px}
.name-row input:focus{border-color:var(--accent)}
.name-row input::placeholder{color:var(--gray)}

/* Footer */
.footer{margin-top:32px;padding:20px 0;text-align:center;font-size:12px;color:var(--gray);border-top:1px solid var(--border)}
.footer a{color:var(--accent);text-decoration:none}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text);padding:10px 20px;border-radius:999px;font-size:13px;border:1px solid var(--border);opacity:0;transition:all .35s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>🏘️ <span>网上邻居</span></h1>
    <span class="badge" id="subnetBadge">加载中…</span>
  </div>

  <!-- IP Status -->
  <div class="card">
    <div class="card-title">🌐 你的网络位置</div>
    <div class="ip-grid">
      <div class="ip-item active">
        <div class="ip-label">你的公网 IP</div>
        <div class="ip-value loading" id="yourIp">检测中…</div>
      </div>
      <div class="ip-item active">
        <div class="ip-label">所属 /24 网段</div>
        <div class="ip-value loading" id="yourSubnet">检测中…</div>
      </div>
    </div>
  </div>

  <!-- Neighbors -->
  <div class="card">
    <div class="card-title">👥 同网段邻居 <span id="onlineCount" style="font-weight:400;color:var(--text-muted)"></span></div>
    <div class="nlist" id="neighborList">
      <div class="empty">加载中…</div>
    </div>
  </div>

  <!-- Bulletin -->
  <div class="card">
    <div class="card-title">💬 公告板</div>

    <div class="name-row">
      <span style="font-size:13px;color:var(--text-muted)">你的昵称：</span>
      <input id="nameInput" placeholder="匿名邻居" maxlength="12">
    </div>

    <div id="msgList"><div class="empty">加载留言中…</div></div>

    <div class="input-row">
      <input id="msgInput" placeholder="说点什么…" maxlength="500">
      <button class="btn" id="postBtn" onclick="postMsg()">发布</button>
    </div>
  </div>

  <div class="footer">
    Made by Eason · 真实数据，同网段实时共享 ·
    <a href="https://github.com/nameefef/net-neighbors" target="_blank">GitHub</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://neighbors.easonyin.xyz';

let myIp = '';
let myName = localStorage.getItem('nn_name') || '';

// Init name input
const nameInput = document.getElementById('nameInput');
nameInput.value = myName;
nameInput.addEventListener('change', () => {
  myName = nameInput.value.trim() || '匿名邻居';
  localStorage.setItem('nn_name', myName);
  // heartbeat with new name
  heartbeat();
});

// Toast
function toast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

// Heartbeat (every 30s)
async function heartbeat() {
  if (!myIp) return;
  try {
    await fetch(`${API}/api/heartbeat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: myName || '匿名邻居' }),
    });
  } catch(e) {}
}

// Fetch neighbors
async function loadNeighbors() {
  try {
    const r = await fetch(`${API}/api/neighbors`);
    const d = await r.json();
    myIp = d.yourIp;
    document.getElementById('yourIp').innerHTML = `${d.yourIp} <span class="sub">/24</span>`;
    document.getElementById('yourSubnet').textContent = d.subnet;
    document.getElementById('subnetBadge').textContent = d.subnet;

    const list = document.getElementById('neighborList');
    document.getElementById('onlineCount').textContent = `· ${d.onlineCount} 在线`;
    list.innerHTML = d.users.map(u => {
      const isYou = u.ip === d.yourIp;
      return `<div class="nrow ${isYou ? 'you' : ''}">
        <span class="dot online"></span>
        <span class="addr ${isYou ? 'you' : ''}">${esc(u.ip)}</span>
        <span class="rname">${esc(u.name)}</span>
        <span class="rtag online">${isYou ? '你' : '在线'}</span>
      </div>`;
    }).join('');

    // Start heartbeat loop
    await heartbeat();
    setInterval(heartbeat, 30000);

  } catch(e) {
    document.getElementById('yourIp').textContent = '⚠️ 后端连接失败';
    document.getElementById('neighborList').innerHTML = '<div class="empty">无法连接到服务器</div>';
  }
}

// Fetch messages
async function loadMsgs() {
  try {
    const r = await fetch(`${API}/api/msgs`);
    const d = await r.json();
    const list = document.getElementById('msgList');
    if (!d.messages || d.messages.length === 0) {
      list.innerHTML = '<div class="empty">还没有留言。<br>写一条试试 👇</div>';
      return;
    }
    const colors = ['#f0883e','#58a6ff','#3fb950','#da3633','#bc8cff'];
    list.innerHTML = d.messages.map(m => {
      const c = colors[m.name.charCodeAt(0) % colors.length];
      return `<div class="msg">
        <div class="msg-av" style="background:${c}">${esc(m.name[0] || '?')}</div>
        <div class="msg-body">
          <div class="msg-hd">
            <span class="msg-n">${esc(m.name)}</span>
            <span class="msg-ip">${esc(m.ip)}</span>
          </div>
          <div class="msg-t">${esc(m.text)}</div>
        </div>
        <span class="msg-tm">${esc(m.time)}</span>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('msgList').innerHTML = '<div class="empty">加载留言失败</div>';
  }
}

// Post message
async function postMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  const btn = document.getElementById('postBtn');
  btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/msgs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        name: myName || '匿名邻居',
      }),
    });
    if (!r.ok) throw new Error('发布失败');
    input.value = '';
    toast('留言已发布 📨');
    await loadMsgs();
  } catch(e) {
    toast('发布失败，请重试');
  }
  btn.disabled = false;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Enter to post
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') postMsg();
});

// Init
loadNeighbors();
loadMsgs();
// Refresh messages every 10s
setInterval(loadMsgs, 10000);
</script>

</body>
</html>
