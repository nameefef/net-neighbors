<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网上邻居</title>
<meta name="description" content="查看你的 IP 网段与邻近用户留言板">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text-muted:#8b949e;--accent:#f0883e;--accent-dim:rgba(240,136,62,.15);--green:#3fb950;--blue:#58a6ff;--gray:#484f58;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC","PingFang SC",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.container{max-width:960px;margin:0 auto;padding:32px 20px;width:100%;flex:1}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:28px}
.header h1{font-size:22px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.header h1 span{color:var(--accent)}
.badge{font-size:12px;background:var(--accent-dim);color:var(--accent);padding:4px 10px;border-radius:999px;border:1px solid rgba(240,136,62,.2);font-weight:500}

/* Status Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.ip-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.ip-grid{grid-template-columns:1fr}}
.ip-item{background:rgba(255,255,255,.03);border-radius:6px;padding:12px 16px;border:1px solid transparent}
.ip-item.active{border-color:rgba(240,136,62,.25);background:var(--accent-dim)}
.ip-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:500}
.ip-value{font-family:"SF Mono","Fira Code","Cascadia Code",monospace;font-size:16px;font-weight:600}
.ip-value.loading{color:var(--text-muted);font-size:13px}
.ip-value .subnet{font-size:13px;font-weight:400;color:var(--text-muted);margin-left:6px}

/* Neighbors list */
.neighbor-list{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.neighbor-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:14px;transition:background .15s}
.neighbor-row:hover{background:rgba(255,255,255,.03)}
.neighbor-row.you{background:var(--accent-dim)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.online{background:var(--green);box-shadow:0 0 6px rgba(63,185,80,.35)}
.dot.you{background:var(--accent);box-shadow:0 0 6px rgba(240,136,62,.35)}
.dot.offline{background:var(--gray)}
.addr{color:var(--text);font-family:"SF Mono",monospace;font-size:13px}
.addr.you{color:var(--accent)}
.row-tag{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:600;margin-left:auto;line-height:1.5}
.row-tag.online{background:rgba(63,185,80,.12);color:var(--green)}
.row-tag.you{background:var(--accent-dim);color:var(--accent)}
.row-tag.offline{color:var(--gray);background:rgba(255,255,255,.04)}
.row-loc{font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}

/* Bulletin */
.msg{padding:12px 0;display:flex;gap:10px}
.msg+.msg{border-top:1px solid var(--border)}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.msg-body{flex:1;min-width:0}
.msg-hd{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1px}
.msg-name{font-size:13px;font-weight:600;color:var(--text)}
.msg-ip{font-size:11px;color:var(--text-muted);font-family:"SF Mono",monospace}
.msg-text{font-size:14px;color:var(--text-muted);line-height:1.6;word-break:break-word}
.msg-time{font-size:11px;color:var(--gray);flex-shrink:0;align-self:flex-start}

/* Input */
.input-row{display:flex;gap:8px;padding-top:14px;margin-top:4px;border-top:1px solid var(--border)}
.input-row input{flex:1;background:#0d1117;border:1px solid var(--border);border-radius:999px;padding:10px 16px;font-size:14px;color:var(--text);outline:none;transition:border .2s}
.input-row input:focus{border-color:var(--accent)}
.input-row input::placeholder{color:var(--gray)}
.btn{padding:9px 20px;border:none;border-radius:999px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Empty state */
.empty-state{text-align:center;padding:32px 0;color:var(--text-muted);font-size:14px;line-height:1.7}
.empty-state strong{color:var(--text)}

/* Footer */
.footer{margin-top:32px;padding:20px 0;text-align:center;font-size:12px;color:var(--gray);border-top:1px solid var(--border)}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text);padding:10px 20px;border-radius:999px;font-size:13px;border:1px solid var(--border);opacity:0;transition:all .35s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🏘️ <span>网上邻居</span></h1>
    <span class="badge">/24 社区公告板</span>
  </div>

  <!-- IP Status -->
  <div class="card">
    <div class="card-title">🌐 你的网络位置</div>
    <div class="ip-grid">
      <div class="ip-item active">
        <div class="ip-label">你的公网 IP</div>
        <div class="ip-value loading" id="yourIp"><span style="font-weight:400">检测中…</span></div>
      </div>
      <div class="ip-item active">
        <div class="ip-label">所属 /24 网段</div>
        <div class="ip-value loading" id="yourSubnet"><span style="font-weight:400">检测中…</span></div>
      </div>
    </div>
  </div>

  <!-- Neighbors -->
  <div class="card">
    <div class="card-title">👥 同网段邻居 <span id="onlineCount" style="font-weight:400;color:var(--text-muted)"></span></div>
    <div class="neighbor-list" id="neighborList">
      <div style="text-align:center;padding:12px 0;color:var(--text-muted);font-size:13px">等待 IP 检测完成…</div>
    </div>
  </div>

  <!-- Bulletin -->
  <div class="card">
    <div class="card-title">
      💬 公告板
      <span style="font-weight:400;color:var(--text-muted);text-transform:none;font-size:12px" id="boardId"></span>
    </div>
    <div id="msgList"></div>
    <div class="input-row">
      <input id="msgInput" placeholder="说点什么…（本地存储，只存你自己）" maxlength="200">
      <button class="btn" id="postBtn" disabled onclick="postMsg()">发布</button>
    </div>
  </div>

  <div class="footer">
    Made by Eason · 纯前端，不留存你的 IP · <a href="https://github.com/nameefef/net-neighbors" target="_blank">GitHub</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let myIp = '';
let mySubnet = '';
const STORAGE_KEY = 'net_neighbor_msgs';

// --- Toast ---
function toast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

// --- Load messages from localStorage ---
function loadMsgs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveMsgs(msgs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
}

function renderMsgs() {
  const list = document.getElementById('msgList');
  const msgs = loadMsgs();
  if (msgs.length === 0) {
    list.innerHTML = `<div class="empty-state">还没有留言。<br>写一条试试 👇</div>`;
    return;
  }
  list.innerHTML = msgs.slice().reverse().map(m => {
    const colors = ['#f0883e','#58a6ff','#3fb950','#da3633','#bc8cff'];
    const c = colors[m.name.charCodeAt(0) % colors.length];
    return `<div class="msg">
      <div class="msg-avatar" style="background:${c}">${m.name[0]}</div>
      <div class="msg-body">
        <div class="msg-hd">
          <span class="msg-name">${esc(m.name)}</span>
          <span class="msg-ip">${esc(m.ip)}</span>
        </div>
        <div class="msg-text">${esc(m.text)}</div>
      </div>
      <span class="msg-time">${m.time}</span>
    </div>`;
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function postMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !myIp) return;
  const msgs = loadMsgs();
  const name = localStorage.getItem('net_neighbor_name') || ('邻居' + Math.random().toString(36).slice(2,6));
  if (!localStorage.getItem('net_neighbor_name')) localStorage.setItem('net_neighbor_name', name);
  msgs.push({
    name,
    ip: myIp,
    text,
    time: new Date().toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
    ts: Date.now()
  });
  saveMsgs(msgs);
  renderMsgs();
  input.value = '';
  toast('已保存到本地 💾');
}

// --- Generate fake neighbors based on real IP ---
function generateNeighbors(ip, subnet) {
  const parts = ip.split('.');
  const base = parseInt(parts[3], 10);
  const ips = [];
  const names = ['拼车小张','机房老王','小区阿花','技术宅小陈','猫奴小李','楼上阿杰','网管大刘','前端小林'];
  const locs = ['同宽带','同机房','同小区','同办公区'];

  for (let i = 0; i < 8; i++) {
    let offset;
    if (i < 4) offset = - (4 - i);
    else offset = (i - 3);
    let ipNum = base + offset;
    if (ipNum < 1) ipNum = 254 + ipNum;
    if (ipNum > 254) ipNum = ipNum - 254;
    ips.push({
      ip: `${parts[0]}.${parts[1]}.${parts[2]}.${ipNum}`,
      name: names[i],
      loc: locs[i % locs.length],
      online: Math.random() > 0.3,
      isYou: (ipNum === base)
    });
  }
  // ensure "you" is at position matching real IP
  const youIdx = ips.findIndex(x => x.isYou);
  if (youIdx > -1 && ips[0].ip !== ip) {
    ips[youIdx].ip = ip;
    ips[youIdx].name = '你';
    ips[youIdx].loc = '当前网络';
    ips[youIdx].online = true;
  }
  // sort: you first, then online, then offline
  ips.sort((a,b) => {
    if (a.isYou) return -1;
    if (b.isYou) return 1;
    if (a.online && !b.online) return -1;
    if (!a.online && b.online) return 1;
    return 0;
  });
  return ips;
}

function renderNeighbors(neighbors) {
  const list = document.getElementById('neighborList');
  const online = neighbors.filter(n => n.online).length;
  document.getElementById('onlineCount').textContent = `· ${online} 在线`;
  list.innerHTML = neighbors.map(n => {
    const cls = n.isYou ? 'you' : (n.online ? 'online' : 'offline');
    return `<div class="neighbor-row ${n.isYou ? 'you' : ''}">
      <span class="dot ${cls}"></span>
      <span class="addr ${n.isYou ? 'you' : ''}">${esc(n.ip)}</span>
      <span class="row-loc">${esc(n.loc)}</span>
      <span class="row-tag ${cls}">${n.isYou ? '你' : (n.online ? '在线' : '离线')}</span>
    </div>`;
  }).join('');
}

// --- Fetch real IP ---
async function fetchIP() {
  const ipEl = document.getElementById('yourIp');
  const subnetEl = document.getElementById('yourSubnet');
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const d = await r.json();
    myIp = d.ip;
    const parts = myIp.split('.');
    mySubnet = `${parts[0]}.${parts[1]}.${parts[2]}.0/24`;
    ipEl.innerHTML = `${myIp} <span class="subnet">/24</span>`;
    subnetEl.innerHTML = `${mySubnet}`;
    document.getElementById('boardId').textContent = `· ${mySubnet}`;

    // generate & render neighbors
    const neighbors = generateNeighbors(myIp, mySubnet);
    renderNeighbors(neighbors);

    // enable post
    document.getElementById('postBtn').disabled = false;
    renderMsgs();
  } catch(e) {
    ipEl.innerHTML = '<span style="font-weight:400;color:var(--gray)">获取失败，请检查网络</span>';
    subnetEl.innerHTML = '<span style="font-weight:400;color:var(--gray)">—</span>';
  }
}

fetchIP();

// Enter to post
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') postMsg();
});
</script>

</body>
</html>
